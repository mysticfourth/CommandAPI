trigger:
- main

variables:
  buildConfiguration: 'Release'  

stages:
- stage: Build
  displayName: Build stage

  jobs:
    
  - job: 'Build'
    pool:
      vmImage: $(vmImageName)
    
    steps:
        - task: UseDotNet@2      
          inputs:
            packageType: 'sdk'
            version: '6.0.x'
            includePreviewVersions: true
        - script: dotnet build --configuration $(buildConfiguration)
          displayName: 'dotnet build $(buildConfiguration)'